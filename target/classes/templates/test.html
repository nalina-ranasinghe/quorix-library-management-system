<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: Arial, sans-serif;
        }
        .test-container {
            padding: 50px;
            text-align: center;
        }
        .test-image {
            width: 100px;
            height: 100px;
            border: 2px solid white;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Static Resources Test</h1>
        <p>This page tests if static resources are working correctly.</p>
        
        <h3>Logo Test:</h3>
        <img src="/css/images/quorix-logo.png" alt="Logo Test" class="test-image">
        
        <h3>Background Test:</h3>
        <div style="width: 200px; height: 100px; background-image: url('/css/images/library-background.jpg'); background-size: cover; border: 2px solid white; margin: 20px auto;"></div>
        
        <h3>CSS Test:</h3>
        <p>If you can see this text in white on a dark background, CSS is working.</p>
        
        <a href="/library-management" class="btn btn-primary">Go to Library Management</a>
    </div>
</body>
</html>
