<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header-links">
    <meta charset="UTF-8">
    <title th:text="${pageTitle} ?: 'Library Management System'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/books}">
            <i class="fa-solid fa-book-open-reader"></i>
            QUORIX Library
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/library-management}"><i class="fa-solid fa-book-reader"></i> Library Management</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/books}"><i class="fa-solid fa-table-list"></i> Book Catalog</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/books/new}"><i class="fa-solid fa-plus"></i> Add Book</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/books/missing}"><i class="fa-solid fa-triangle-exclamation"></i> Missing Books</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
