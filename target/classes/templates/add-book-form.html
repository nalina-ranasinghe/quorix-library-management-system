<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Add New Book - Quorix Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <a href="#" class="sidebar-brand">
            <img th:src="@{/css/images/quorix-logo.png}" alt="Quorix" class="sidebar-logo"/>
        </a>
        <ul class="sidebar-nav">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/staff/library-management}">
                    <i class="fas fa-book-reader"></i>Library Management
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/staff/books}">
                    <i class="fas fa-table-list"></i>Book Catalog
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" th:href="@{/staff/books/new}">
                    <i class="fas fa-plus"></i>Add Book
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/staff/books/missing}">
                    <i class="fas fa-triangle-exclamation"></i>Missing Books
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Page Header -->
        <div class="page-header">
            <div class="container-fluid">
                <h1 class="page-title">
                    <i class="fas fa-plus me-3"></i>Add New Book
                </h1>
                <p class="page-subtitle">Book Registration Form</p>
            </div>
        </div>

        <!-- Content -->
        <div class="container-fluid">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-header">
                            <h2 class="mb-0">Add a New Book to the Catalog</h2>
                        </div>
                        <div class="card-body">
                            <!-- Display error message if any -->
                            <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                <span th:text="${param.error}"></span>
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>

                            <form th:action="@{/staff/books/save}" th:object="${book}" method="POST">
                                <div class="mb-3">
                                    <label for="title" class="form-label">Book Title</label>
                                    <input type="text" th:field="*{title}" class="form-control" id="title" required>
                                </div>

                                <div class="mb-3">
                                    <label for="author" class="form-label">Author</label>
                                    <input type="text" th:field="*{author}" class="form-control" id="author" required>
                                </div>

                                <div class="mb-3">
                                    <label for="isbn" class="form-label">ISBN (Numbers Only)</label>
                                    <input type="text" th:field="*{isbn}" class="form-control" id="isbn" pattern="[0-9]{10,13}" required>
                                    <div class="form-text">Enter 10-13 digits only.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="category" class="form-label">Category</label>
                                    <select th:field="*{category}" class="form-select" id="category">
                                        <option value="Fiction">Fiction</option>
                                        <option value="Mystery">Mystery</option>
                                        <option value="History">History</option>
                                        <option value="Biography">Biography</option>
                                        <option value="Fantasy">Fantasy</option>
                                        <option value="Novel">Novel</option>
                                        <option value="Science Fiction">Science Fiction</option>
                                        <option value="Romance">Romance</option>
                                        <option value="Thriller">Thriller</option>
                                        <option value="Non-Fiction">Non-Fiction</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="location" class="form-label">Location</label>
                                    <select th:field="*{location}" class="form-select" id="location">
                                        <option value="Shelf A-1">Shelf A-1</option>
                                        <option value="Shelf A-2">Shelf A-2</option>
                                        <option value="Shelf B-1">Shelf B-1</option>
                                        <option value="Shelf B-2">Shelf B-2</option>
                                        <option value="Shelf C-1">Shelf C-1</option>
                                        <option value="Shelf C-2">Shelf C-2</option>
                                        <option value="Reference Section">Reference Section</option>
                                        <option value="Periodicals">Periodicals</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="quantity" class="form-label">Quantity</label>
                                    <input type="number" th:field="*{quantity}" class="form-control" id="quantity" min="1" value="1" required>
                                    <div class="form-text">Enter the number of copies available for this book.</div>
                                </div>

                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-success">
                                        <i class="fas fa-check me-1"></i>Save Book
                                    </button>
                                    <a th:href="@{/staff/books}" class="btn btn-secondary">
                                        <i class="fas fa-times me-1"></i>Cancel
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer sidebar-footer">
        <div class="container-fluid">
            <p class="mb-0">© 2025 SLIIT - SE2030 Group 2025-Y2-SI-KU-16. All Rights Reserved.</p>
        </div>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Update date and time
    function updateDateTime() {
        const now = new Date();
        document.getElementById('currentDateTime').textContent =
            now.toLocaleDateString() + ' ' + now.toLocaleTimeString();
    }

    // ISBN input validation - only allow numbers
    function validateISBNInput(input) {
        // Remove any non-numeric characters
        input.value = input.value.replace(/[^0-9]/g, '');

        // Limit to 13 digits maximum
        if (input.value.length > 13) {
            input.value = input.value.substring(0, 13);
        }
    }

    // Initialize page
    document.addEventListener('DOMContentLoaded', function() {
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // Add event listener to ISBN input
        const isbnInput = document.getElementById('isbn');
        if (isbnInput) {
            isbnInput.addEventListener('input', function() {
                validateISBNInput(this);
            });

            // Prevent paste of non-numeric content
            isbnInput.addEventListener('paste', function(e) {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text');
                const numericOnly = paste.replace(/[^0-9]/g, '');
                if (numericOnly.length <= 13) {
                    this.value = numericOnly;
                }
            });
        }
    });
</script>
</body>
</html>
