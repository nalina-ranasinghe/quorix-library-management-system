<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Account Settings | Quorix Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/home.css}">

    <style>
        :root {
            --admin-blue: #3B82F6;
            --admin-yellow: #ffc107;
        }
        .section-title {
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 1.5rem;
        }
        .icon-blue { color: var(--admin-blue); }
        .icon-yellow { color: var(--admin-yellow); }

        .blur-card {
            background-color: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .blur-card .form-control {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #FFFFFF;
            border-radius: 0.375rem;
            padding: 0.75rem 1rem;
        }
        .blur-card .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: none;
            border-color: var(--admin-blue);
            color: #FFFFFF;
        }
        .blur-card .form-label {
            font-weight: 500;
            color: #E5E7EB;
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body>

<header class="home-header" th:replace="~{home :: header}"></header>

<main class="container py-5">
    <h2 class="mb-4 section-title">Account Settings</h2>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="blur-card">
        <div class="card-body">
            <form th:action="@{/account/settings}" method="post" th:object="${currentUser}">
                <h4 class="section-title">
                    <i class="fas fa-user-edit me-2 icon-blue"></i>
                    Personal Information
                </h4>
                <div class="row g-3">
                    <div class="col-md-6 mb-3"><label for="fullName" class="form-label">Full Name</label><input type="text" class="form-control" id="fullName" name="fullName" th:field="*{fullName}" required></div>
                    <div class="col-md-6 mb-3"><label for="username" class="form-label">Username</label><input type="text" class="form-control" id="username" th:field="*{username}" readonly disabled><div class="form-text text-white-50">Your username cannot be changed.</div></div>
                    <div class="col-md-6 mb-3"><label for="email" class="form-label">Email Address</label><input type="email" class="form-control" id="email" name="email" th:field="*{email}" required></div>
                    <div class="col-md-6 mb-3"><label for="phone" class="form-label">Phone Number</label><input type="tel" class="form-control" id="phone" name="phone" th:field="*{phone}" required></div>
                </div>
                <hr class="my-4" style="border-color: rgba(255,255,255,0.1);">
                <h4 class="section-title">
                    <i class="fas fa-key me-2 icon-yellow"></i>
                    Change Password
                </h4>
                <p class="text-white-50">Leave these fields blank if you do not want to change your password.</p>
                <div class="row g-3">
                    <div class="col-md-6 mb-3"><label for="newPassword" class="form-label">New Password</label><input type="password" class="form-control" id="newPassword" name="newPassword"></div>
                    <div class="col-md-6 mb-3"><label for="confirmPassword" class="form-label">Confirm New Password</label><input type="password" class="form-control" id="confirmPassword" name="confirmPassword"></div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save me-2"></i>Save Changes</button>
                    <a th:href="@{/my-books}" class="btn btn-secondary"><i class="fas fa-times me-2"></i>Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{home :: footer}"></div>
<script th:src="@{/js/home.js}"></script>
</body>
</html>
