<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::content})}">
<head>
    <title>Usage Patterns Report</title>
</head>
<body>
<div th:fragment="content">
    <div class="content-header">
        <h1 data-typing-effect="Usage Patterns" class="animate-fade-in-up"></h1>
    </div>

    <div class="card mb-4 animate-fade-in-up" style="animation-delay: 200ms;">
        <div class="card-header"><h5 class="mb-0"><i class="fas fa-book-reader me-2"></i>Top 10 Popular Books</h5></div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead><tr><th>Rank</th><th>Title</th><th>Author</th><th class="text-center">Total Borrows</th></tr></thead>
                    <tbody>
                    <tr th:each="book, i : ${usageReportData.popularBooks}">
                        <td th:text="${i.count}"></td>
                        <td th:text="${book.title}"></td>
                        <td th:text="${book.author}"></td>
                        <td class="fw-bold text-center" th:text="${book.borrowCount}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(usageReportData.popularBooks)}">
                        <td colspan="4" class="text-center">No borrowing data available.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card animate-fade-in-up" style="animation-delay: 300ms;">
        <div class="card-header"><h5 class="mb-0"><i class="fas fa-users me-2"></i>Top 10 Active Users</h5></div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead><tr><th>Rank</th><th>Username</th><th>Full Name</th><th class="text-center">Total Borrows</th></tr></thead>
                    <tbody>
                    <tr th:each="user, i : ${usageReportData.topUsers}">
                        <td th:text="${i.count}"></td>
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.fullName}"></td>
                        <td class="fw-bold text-center" th:text="${user.borrowCount}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(usageReportData.topUsers)}">
                        <td colspan="4" class="text-center">No borrowing data available.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
