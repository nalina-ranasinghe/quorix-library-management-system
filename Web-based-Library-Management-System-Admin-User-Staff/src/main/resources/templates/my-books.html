<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Account | Quorix Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
<header th:replace="~{home :: header}"></header>

<main class="container py-5">
    <h2 class="mb-4 section-title">My Account</h2>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="blur-card">
        <h5 class="section-title">My Borrowed Books</h5>
        <div th:if="${#lists.isEmpty(borrowedBooks)}" class="text-center p-4">
            <p class="lead text-white-50">You have no borrowed books.</p>
        </div>
        <div th:if="${not #lists.isEmpty(borrowedBooks)}" class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th scope="col">Book Title</th>
                    <th scope="col">Author</th>
                    <th scope="col">Due Date</th>
                    <th scope="col" class="text-center">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="borrowing : ${borrowedBooks}">
                    <td th:text="${borrowing.bookTitle}"></td>
                    <td th:text="${borrowing.bookAuthor}"></td>
                    <td th:text="${#temporals.format(borrowing.dueDate, 'dd MMM yyyy')}"></td>
                    <td class="text-center">
                        <form th:action="@{/borrowings/renew/{id}(id=${borrowing.borrowingId})}" method="post">
                            <button type="submit" class="btn btn-info btn-sm">Renew (+7 days)</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="blur-card">
        <h5 class="section-title">My Reserved Books</h5>
        <div th:if="${#lists.isEmpty(reservedBooks)}" class="text-center p-4">
            <p class="lead text-white-50">You have no active reservations.</p>
        </div>
        <div th:if="${not #lists.isEmpty(reservedBooks)}" class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th scope="col">Book Title</th>
                    <th scope="col">Author</th>
                    <th scope="col">Reserved On</th>
                    <th scope="col" class="text-center">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="reservation : ${reservedBooks}">
                    <td th:text="${reservation.bookTitle}"></td>
                    <td th:text="${reservation.bookAuthor}"></td>
                    <td th:text="${#temporals.format(reservation.reservedAt, 'dd MMM yyyy, hh:mm a')}"></td>
                    <td class="text-center">
                        <form th:action="@{/reservations/cancel/{id}(id=${reservation.reservationId})}" method="post">
                            <button type="submit" class="btn btn-danger btn-sm">Cancel</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="blur-card">
        <h5 class="section-title">My Waitlisted Books</h5>
        <div th:if="${#lists.isEmpty(waitlistedBooks)}" class="text-center p-4">
            <p class="lead text-white-50">You are not on any waitlists.</p>
        </div>
        <div th:if="${not #lists.isEmpty(waitlistedBooks)}" class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th scope="col">Book Title</th>
                    <th scope="col">Author</th>
                    <th scope="col">Waitlisted On</th>
                    <th scope="col" class="text-center">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="waitlist : ${waitlistedBooks}">
                    <td th:text="${waitlist.bookTitle}"></td>
                    <td th:text="${waitlist.bookAuthor}"></td>
                    <td th:text="${#temporals.format(waitlist.waitlistedAt, 'dd MMM yyyy, hh:mm a')}"></td>
                    <td class="text-center">
                        <form th:action="@{/waitlist/cancel/{id}(id=${waitlist.waitlistId})}" method="post" onsubmit="return confirm('Are you sure you want to leave the waitlist for this book?');">
                            <button type="submit" class="btn btn-danger btn-sm"><i class="fas fa-times me-1"></i> Cancel</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{home :: footer}"></div>
<script th:src="@{/js/home.js}"></script>
</body>
</html>
