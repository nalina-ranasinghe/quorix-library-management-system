<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notifications | Quorix Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/home.css}">

    <style>
        :root {
            --admin-blue: #3B82F6;
        }
        .section-title {
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 1.5rem;
        }

        .blur-card {
            background-color: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .blur-card .list-group-item {
            background-color: transparent;
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        .list-group-item-dark-custom {
            background-color: rgba(255, 255, 255, 0.05) !important;
            font-weight: 600;
        }
        /* Style for the "New" badge */
        .badge.bg-primary {
            background-color: var(--admin-blue) !important;
        }
    </style>
</head>
<body>
<header th:replace="~{home :: header}"></header>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 section-title">Notification Center</h2>
        <div>
            <a th:href="@{/home}" class="btn btn-outline-light me-2">
                <i class="fas fa-home me-2"></i>Back to Home
            </a>
            <form th:action="@{/notifications/mark-all-read}" method="post" class="d-inline-block me-2">
                <button type="submit" class="btn btn-outline-light" th:disabled="${unreadCount == 0}">
                    <i class="fas fa-check-double me-2"></i>Mark All as Read
                </button>
            </form>
            <a th:href="@{/notifications/preferences}" class="btn btn-secondary">
                <i class="fas fa-cog me-2"></i>Preferences
            </a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="blur-card">
        <h4 class="section-title">My Notifications</h4>
        <div th:if="${#lists.isEmpty(notifications)}" class="text-center p-4">
            <p class="lead text-white-50">You have no new notifications.</p>
        </div>

        <div th:if="${not #lists.isEmpty(notifications)}" class="list-group">
            <div th:each="notification : ${notifications}"
                 class="list-group-item d-flex justify-content-between align-items-center"
                 th:classappend="${notification.status == 'UNREAD'} ? 'list-group-item-dark-custom' : ''">

                <div>
                    <h5 class="mb-1">
                        <span th:if="${notification.status == 'UNREAD'}" class="badge bg-primary me-2">New</span>
                        <span th:text="${notification.type.replace('_', ' ')}"></span>
                    </h5>
                    <p class="mb-1" th:text="${notification.message}"></p>
                    <small th:text="${#temporals.format(notification.sentAt, 'dd MMM yyyy, hh:mm a')}"></small>
                </div>

                <div class="d-flex">
                    <form th:if="${notification.status == 'UNREAD'}"
                          th:action="@{/notifications/mark-read/{id}(id=${notification.notificationId})}"
                          method="post" class="me-2">
                        <button type="submit" class="btn btn-sm btn-outline-success" title="Mark as Read">
                            <i class="fas fa-check"></i>
                        </button>
                    </form>

                    <form th:action="@{/notifications/delete/{id}(id=${notification.notificationId})}"
                          method="post"
                          onsubmit="return confirm('Are you sure you want to delete this notification?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="blur-card">
        <h4 class="section-title">Announcements</h4>
        <div th:if="${#lists.isEmpty(announcements)}" class="text-center p-4">
            <p class="lead text-white-50">There are no recent announcements.</p>
        </div>
        <div th:if="${not #lists.isEmpty(announcements)}" class="list-group">
            <div th:each="announcement : ${announcements}" class="list-group-item">
                <div class="d-flex w-100 justify-content-between">
                    <h5 class="mb-1" th:text="${announcement.title()}"></h5>
                    <small th:text="${#temporals.format(announcement.createdAt(), 'dd MMM yyyy')}"></small>
                </div>
                <p class="mb-1" th:text="${announcement.message()}"></p>
                <small class="text-white-50" th:text="'Posted by Admin'"></small>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{home :: footer}"></div>
<script th:src="@{/js/home.js}"></script>
</body>
</html>
