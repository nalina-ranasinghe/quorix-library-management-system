<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::content})}">
<head>
    <title>Pending Approvals</title>
</head>
<body>
<div th:fragment="content">
    <div class="content-header">
        <h1>Pending Membership Approvals</h1>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Registration Date</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${pendingUsers}">
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.fullName}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${#temporals.format(user.createdAt, 'dd-MMM-yyyy')}"></td>
                        <td class="text-end">
                            <form th:action="@{/admin/users/approve/{id}(id=${user.userId})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-success">
                                    <i class="fas fa-check me-1"></i> Approve
                                </button>
                            </form>
                            <form th:action="@{/admin/users/reject/{id}(id=${user.userId})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to reject and delete this user?');">
                                    <i class="fas fa-times me-1"></i> Reject
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(pendingUsers)}">
                        <td colspan="5" class="text-center">
                            <i class="fas fa-check-circle text-success me-2"></i>
                            There are no pending user approvals.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
