<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Book Catalog - Quorix Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <!-- Top Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-book me-2"></i>QUORIX Library
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/library-management}">
                    <i class="fas fa-book-reader me-1"></i>Library Management
                </a>
                <a class="nav-link active" th:href="@{/books}">
                    <i class="fas fa-table-list me-1"></i>Book Catalog
                </a>
                <a class="nav-link" th:href="@{/books/new}">
                    <i class="fas fa-plus me-1"></i>Add Book
                </a>
                <a class="nav-link" th:href="@{/books/missing}">
                    <i class="fas fa-triangle-exclamation me-1"></i>Missing Books
                </a>
            </div>
        </div>
    </nav>

    <!-- Header Bar -->
    <div class="header-bar">
        <div class="container-fluid">
            <div class="header-content">
                <div>
                    <h1 class="header-title">
                        <i class="fas fa-table-list me-2"></i>Library Management System
                    </h1>
                </div>
                <div>
                    <h2 class="header-subtitle">Book Catalog & Inventory</h2>
                    <small class="text-muted" id="currentDateTime"></small>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="card">
            <div class="card-body">
                <!-- Error Message Display -->
                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <span th:text="${param.error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <!-- Search Bar -->
                <div class="search-container">
                    <form th:action="@{/books/search}" method="GET" class="d-flex">
                        <input type="text" name="keyword" class="form-control" placeholder="Search by Title or Author..." required>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-search me-1"></i>Search
                        </button>
                    </form>
                </div>

                <!-- Books Table -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Author</th>
                                <th>Category</th>
                                <th>ISBN</th>
                                <th>Location</th>
                                <th>Quantity</th>
                                <th>Status</th>
                                <th>Created On</th>
                                <th>Last Updated</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="book : ${listBooks}">
                                <td th:text="${book.title}"></td>
                                <td th:text="${book.author}"></td>
                                <td th:text="${book.category}"></td>
                                <td th:text="${book.isbn}"></td>
                                <td th:text="${book.location}"></td>
                                <td>
                                    <span th:text="${book.quantity}"
                                          th:classappend="${book.quantity > 0} ? 'badge bg-success' : 'badge bg-danger'">
                                    </span>
                                </td>
                                <td>
                                    <span th:text="${book.status}"
                                          th:classappend="${book.status == 'Available'} ? 'badge bg-success' : (${book.status == 'Missing'} ? 'badge bg-danger' : (${book.status == 'Borrowed'} ? 'badge bg-warning' : 'badge bg-secondary'))">
                                    </span>
                                </td>
                                <td th:text="${#temporals.format(book.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                                <td th:text="${book.updatedAt != null} ? ${#temporals.format(book.updatedAt, 'yyyy-MM-dd HH:mm')} : 'N/A'"></td>
                                <td>
                                    <a th:href="@{/books/edit/{id}(id=${book.id})}"
                                       class="btn btn-sm btn-outline-primary"
                                       title="Update Book">
                                        <i class="fas fa-edit me-1"></i>Update
                                    </a>
                                    <a th:href="@{/books/delete/{id}(id=${book.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       title="Delete Book"
                                       onclick="return confirm('Are you sure you want to delete this book? This action cannot be undone.')">
                                        <i class="fas fa-trash me-1"></i>Delete
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">© 2025 SLIIT - SE2030 Group 2025-Y2-SI-KU-16. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Update date and time
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDateTime').textContent = 
                now.toLocaleDateString() + ' ' + now.toLocaleTimeString();
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            updateDateTime();
            setInterval(updateDateTime, 1000);
        });
    </script>
</body>
</html>
