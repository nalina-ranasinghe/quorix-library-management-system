<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password | Quorix Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-container text-center">
    <div class="login-card">
        <h4 class="mb-4">Reset Your Password</h4>
        <p class="text-secondary-light mb-4">Enter your username and email to verify your identity.</p>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="@{/forgot-password}" method="post" class="text-start">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-3">Verify</button>
        </form>
    </div>
    <a th:href="@{/}" class="guest-link mt-4 d-inline-block">Back to Login</a>
</div>
</body>
</html>
