<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | Quorix Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="login-container text-center">
    <img th:src="@{/images/quorix-logo.png}" alt="Quorix" class="login-logo"/>

    <div class="login-card">
        <ul class="nav nav-tabs nav-fill mb-4" id="authTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button" role="tab">Sign In</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button" role="tab">Sign Up</button>
            </li>
        </ul>

        <div class="tab-content" id="authTabsContent">
            <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
                <form th:action="@{/auth/login}" method="post" class="text-start">
                    <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
                    <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>
                    <div class="mb-3">
                        <label for="username" class="form-label">Username or Email</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="text-end mb-3">
                        <a th:href="@{/forgot-password}" class="guest-link" style="font-size: 0.9rem;">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-3">Sign In</button>
                </form>
            </div>

            <div class="tab-pane fade" id="register-pane" role="tabpanel">
                <form id="registerForm" class="text-start">
                    <div class="mb-3"><label for="regUsername" class="form-label">Username</label><input type="text" class="form-control" id="regUsername" required></div>
                    <div class="mb-3"><label for="fullName" class="form-label">Full Name</label><input type="text" class="form-control" id="fullName" required></div>
                    <div class="mb-3"><label for="regEmail" class="form-label">Email</label><input type="email" class="form-control" id="regEmail" required></div>
                    <div class="mb-3"><label for="regPhone" class="form-label">Phone</label><input type="tel" class="form-control" id="regPhone" required></div>
                    <div class="mb-3"><label for="regPassword" class="form-label">Password</label><input type="password" class="form-control" id="regPassword" required></div>
                    <div class="mb-3"><label for="confirmPassword" class="form-label">Confirm Password</label><input type="password" class="form-control" id="confirmPassword" required></div>
                    <div id="register-error" class="alert alert-danger d-none"></div>
                    <div id="register-success" class="alert alert-success d-none"></div>
                    <button type="submit" class="btn btn-primary w-100 mt-3">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <a th:href="@{/home}" class="guest-link mt-4 d-inline-block">Continue as Guest</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
