<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Settings | Quorix Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>

<header class="home-header" th:if="${currentUser}">
    <div class="header-logo">
        <a th:href="@{/home}"><img th:src="@{/images/quorix-logo.png}" alt="Logo"></a>
    </div>
    <div class="user-menu">
        <a th:href="@{/home}" class="btn btn-outline-light">Back to Home</a>
    </div>
</header>

<main class="container py-5">
    <div class="card mx-auto" style="max-width: 700px;">
        <div class="card-body">
            <h2 class="card-title mb-4">Account Settings</h2>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/settings}" method="post" th:if="${currentUser}">
                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" id="fullName" name="fullName" class="form-control" th:value="${currentUser.fullName}" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-control" th:value="${currentUser.email}" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="tel" id="phone" name="phone" class="form-control" th:value="${currentUser.phone}" required>
                </div>
                <hr class="my-4" style="border-color: var(--border-color);">
                <p class="text-secondary-light">Update Password (Optional)</p>
                <div class="mb-3">
                    <label for="newPassword" class="form-label">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" class="form-control" placeholder="Leave blank to keep current password">
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm New Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3">Save Changes</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
