<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_parameter_name" th:content="${_csrf.parameterName}"/>

    <title>Home | Quorix Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>

<header class="home-header" th:fragment="header">
    <div class="header-logo">
        <a th:href="@{/home}"><img th:src="@{/images/quorix-logo.png}" alt="Quorix Library Logo"></a>
    </div>
    <div class="search-bar">
        <input type="text" id="searchInput" class="form-control" placeholder="Search by title, author, or category...">
    </div>
    <div class="user-menu" th:if="${currentUser}">
        <span th:text="'Welcome, ' + ${currentUser.fullName}"></span>
        <img th:src="@{/images/user-icon.png}" alt="User" class="user-menu-icon" id="userIcon">
        <div class="user-dropdown" id="userDropdown">
            <a th:href="@{/my-books}">Account</a>
            <a th:href="@{/notifications}">Notifications</a>
            <a th:href="@{/account/settings}">Settings</a>
            <a href="#" id="aboutLink">About</a>
            <hr class="my-1" style="border-color: var(--border-color);">
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-link text-white text-decoration-none w-100 text-start" style="padding: 0.75rem 1.25rem;">
                    Logout
                </button>
            </form>
        </div>
    </div>
</header>

<main class="container py-5">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <h2 class="mb-4">Available Books</h2>
    <div class="row g-4" id="bookGrid">
        <div th:each="book : ${books}" class="col-lg-3 col-md-4 col-sm-6">
            <div class="book-card">
                <img th:src="@{'/images/books/' + ${book.isbn} + '.jpg'}"
                     onerror="this.onerror=null; this.src='/images/books/placeholder.jpg';"
                     class="card-img-top book-card-img" alt="Book Cover">
                <div class="card-body">
                    <h5 class="card-title" th:text="${book.title}"></h5>
                    <p class="card-text text-secondary-light" th:text="${book.author}"></p>
                </div>

                <div class="card-footer d-flex justify-content-between align-items-center bg-transparent border-top-0 pt-0">
                    <span class="badge" th:classappend="${book.quantity > 0 ? 'bg-success' : 'bg-danger'}" th:text="${book.quantity > 0 ? book.quantity + ' Available' : 'Out of Stock'}"></span>

                    <div th:if="${book.quantity > 0}">
                        <form th:action="@{/reserve}" method="post" class="d-inline">
                            <input type="hidden" name="bookId" th:value="${book.bookId}" />
                            <button type="submit" class="btn btn-primary btn-sm">Reserve</button>
                        </form>
                    </div>

                    <div th:if="${book.quantity <= 0}">
                        <form th:action="@{/waitlist}" method="post" class="d-inline">
                            <input type="hidden" name="bookId" th:value="${book.bookId}" />
                            <button type="submit" class="btn btn-warning btn-sm">Join Waitlist</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="footer" id="footerSection" th:fragment="footer">
    <div class="container">
        <div class="row">
            <div class="col-md-4 mb-3">
                <h5>About Quorix</h5>
                <p class="text-secondary-light">Connecting communities with knowledge and stories.</p>
            </div>
            <div class="col-md-4 mb-3">
                <h5>Quick Links</h5>
                <ul class="list-unstyled">
                    <li><a th:href="@{/home}" class="text-secondary-light">Home</a></li>
                    <li><a th:href="@{/my-books}" class="text-secondary-light">My Account</a></li>
                </ul>
            </div>
            <div class="col-md-4 mb-3">
                <h5>Contact Us</h5>
                <p class="text-secondary-light">10C/9, Temple Road, Kengalla, Kandy<br>quorix@publiclibrary.com<br>+94 81 810 9244</p>
            </div>
        </div>
        <hr>
        <p class="text-center text-secondary-light">&copy; 2025 Quorix Library. All Rights Reserved.</p>
    </div>
</footer>

<script th:src="@{/js/home.js}"></script>
</body>
</html>
