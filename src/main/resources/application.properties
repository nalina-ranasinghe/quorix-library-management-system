spring.application.name=app

# CORRECTED: Connect to the SQLEXPRESS named instance
spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=LibraryDB;encrypt=true;trustServerCertificate=true;

# Your other properties remain the same
spring.datasource.username=sa
spring.datasource.password=789
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=validate


# Connection Pool
spring.datasource.hikari.maximum-pool-size=10

# Email Configuration (Add these lines)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=--------------
spring.mail.password=*************
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging (optional, for debugging)
logging.level.org.springframework.jdbc.core=debug