<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} ?: 'Quorix Library'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="dashboard-wrapper">
    <aside class="sidebar">
        <div class="sidebar-header">
            <img th:src="@{/css/images/quorix-logo.png}" alt="Quorix Logo" class="sidebar-logo">

        </div>
        <ul class="sidebar-nav">
            <li class="nav-item">
                <a th:href="@{/staff/library-management}" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                    <i class="nav-icon fa-solid fa-book-reader"></i> Library Management
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/staff/books}" th:classappend="${activePage == 'catalog'} ? 'active' : ''">
                    <i class="nav-icon fa-solid fa-table-list"></i> Book Catalog
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/staff/books/new}" th:classappend="${activePage == 'add'} ? 'active' : ''">
                    <i class="nav-icon fa-solid fa-plus-square"></i> Add Book
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/staff/books/missing}" th:classappend="${activePage == 'missing'} ? 'active' : ''">
                    <i class="nav-icon fa-solid fa-triangle-exclamation"></i> Missing Books
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <a href="#" class="nav-item">
                <i class="nav-icon fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div th:insert="${content}"></div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
